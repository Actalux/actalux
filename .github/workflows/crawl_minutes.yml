name: crawl-minutes

# Crawl Clayton CivicPlus (MeetingsManager) agendas + minutes for a city body and
# ingest them. claytonmo.gov is behind Akamai, so this uses Playwright with REAL
# Google Chrome (bundled Chromium is hard-blocked). Separate from transcribe.yml
# (YouTube/Whisper) on purpose. Dispatch-only — no schedule yet.
#
# Required repository secrets:
#   SUPABASE_URL / SUPABASE_KEY / SUPABASE_SERVICE_KEY / SUPABASE_PAT  (ingest)
#   OPENAI_API_KEY                                                     (summaries)

on:
  workflow_dispatch:
    inputs:
      body:
        description: "Which city body"
        type: choice
        options: [council, plan-commission]
        default: council
      limit:
        description: "Max meetings to process"
        required: false
        default: "5"
      since:
        description: "Only meetings on/after YYYY-MM-DD"
        required: false
        default: ""
      minutes_only:
        description: "Minutes only (skip large agenda packets)"
        type: boolean
        default: true
      ingest:
        description: "Ingest into the DB (uncheck for a crawl-only dry run)"
        type: boolean
        default: true

permissions:
  contents: read

# One crawl at a time (the site is rate-sensitive); independent of transcribe.
concurrency:
  group: crawl-minutes
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ACTALUX_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ACTALUX_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ACTALUX_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ACTALUX_SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright + real Chrome
        run: uv run --with playwright python -m playwright install --with-deps chrome

      - name: Verify schema is up to date
        if: ${{ inputs.ingest }}
        run: uv run python scripts/apply_migrations.py --check

      - name: Crawl agendas + minutes
        env:
          BODY: ${{ inputs.body }}
          LIMIT: ${{ inputs.limit }}
          SINCE: ${{ inputs.since }}
          MINUTES_ONLY: ${{ inputs.minutes_only }}
        run: |
          ARGS="--body $BODY"
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          [ -n "$SINCE" ] && ARGS="$ARGS --since $SINCE"
          [ "$MINUTES_ONLY" = "true" ] && ARGS="$ARGS --minutes-only"
          uv run --with playwright python scripts/crawl_civicplus.py $ARGS

      - name: Ingest documents
        if: ${{ inputs.ingest }}
        env:
          BODY: ${{ inputs.body }}
        run: |
          if [ -f data/documents/civicplus_manifest.json ]; then
            uv run python scripts/ingest.py --manifest data/documents/civicplus_manifest.json --body "$BODY"
          else
            echo "::warning::no documents crawled; nothing to ingest"
          fi

      - name: Generate document summaries
        if: ${{ inputs.ingest }}
        run: uv run python scripts/backfill_doc_summaries.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: civicplus-docs
          path: |
            data/documents/*.pdf
            data/documents/civicplus_manifest.json
          if-no-files-found: ignore
          retention-days: 30
