name: crawl-minutes

# Crawl Clayton CivicPlus (MeetingsManager) agendas + minutes for a city body and
# ingest them. claytonmo.gov is behind Akamai, so this uses Playwright with REAL
# Google Chrome (bundled Chromium is hard-blocked). Separate from transcribe.yml
# (YouTube/Whisper) on purpose. Runs daily on a schedule (also dispatchable) so new
# agendas and, especially, minutes (which post ~one meeting cycle late) are picked
# up within a day of publishing.
#
# Required repository secrets:
#   SUPABASE_URL / SUPABASE_KEY / SUPABASE_SERVICE_KEY / SUPABASE_PAT  (ingest)
#   OPENAI_API_KEY                                                     (summaries)

on:
  workflow_dispatch:
    inputs:
      body:
        description: "Which city body"
        type: choice
        options: [council, plan-commission, board-of-adjustment]
        default: council
      limit:
        description: "Max meetings to process"
        required: false
        default: "5"
      since:
        description: "Only meetings on/after YYYY-MM-DD"
        required: false
        default: ""
      minutes_only:
        description: "Minutes only (skip large agenda packets)"
        type: boolean
        default: true
      ingest:
        description: "Ingest into the DB (uncheck for a crawl-only dry run)"
        type: boolean
        default: true
  schedule:
    # Daily, one body per fire (staggered, ~2 AM US Central), so every city body's
    # new agendas + minutes are picked up within a day. Newest-first with a modest
    # cap; already-ingested docs are deduped, so most days are no-ops. The cron maps
    # to a body in "Resolve crawl params". GitHub may delay scheduled runs.
    - cron: "0 7 * * *" # council
    - cron: "20 7 * * *" # plan-commission
    - cron: "40 7 * * *" # board-of-adjustment

permissions:
  contents: read

# One crawl at a time (the site is rate-sensitive); independent of transcribe.
concurrency:
  group: crawl-minutes
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ACTALUX_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ACTALUX_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ACTALUX_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ACTALUX_SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright + real Chrome
        run: uv run --with playwright python -m playwright install --with-deps chrome

      - name: Install Tesseract (OCR for scanned agenda dockets)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Verify schema is up to date
        if: ${{ github.event_name == 'schedule' || inputs.ingest }}
        run: uv run python scripts/apply_migrations.py --check

      # Scheduled runs send no inputs, so the body comes from which cron fired;
      # dispatch runs use the inputs. Resolved once into $GITHUB_ENV.
      - name: Resolve crawl params
        env:
          INPUT_BODY: ${{ inputs.body }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_SINCE: ${{ inputs.since }}
          INPUT_MINUTES_ONLY: ${{ inputs.minutes_only }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "$SCHEDULE" in
              "20 7 * * *") BODY=plan-commission ;;
              "40 7 * * *") BODY=board-of-adjustment ;;
              *) BODY=council ;;
            esac
            LIMIT=6             # daily incremental: newest-first, already-ingested deduped
            SINCE=""
            MINUTES_ONLY=false  # capture agenda dockets too, not just minutes
          else
            BODY="$INPUT_BODY"
            LIMIT="$INPUT_LIMIT"
            SINCE="$INPUT_SINCE"
            MINUTES_ONLY="$INPUT_MINUTES_ONLY"
          fi
          {
            echo "BODY=$BODY"
            echo "LIMIT=$LIMIT"
            echo "SINCE=$SINCE"
            echo "MINUTES_ONLY=$MINUTES_ONLY"
          } >> "$GITHUB_ENV"
          echo "Resolved: body=$BODY limit=$LIMIT since=$SINCE minutes_only=$MINUTES_ONLY"

      - name: Crawl agendas + minutes
        run: |
          ARGS="--body $BODY"
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          [ -n "$SINCE" ] && ARGS="$ARGS --since $SINCE"
          [ "$MINUTES_ONLY" = "true" ] && ARGS="$ARGS --minutes-only"
          uv run --with playwright python scripts/crawl_civicplus.py $ARGS

      - name: Ingest documents
        if: ${{ github.event_name == 'schedule' || inputs.ingest }}
        run: |
          if [ -f data/documents/civicplus_manifest.json ]; then
            uv run python scripts/ingest.py --manifest data/documents/civicplus_manifest.json --body "$BODY"
          else
            echo "::warning::no documents crawled; nothing to ingest"
          fi

      # Minutes carry the votes. Re-ingesting a minutes doc creates a new version,
      # but vote extraction is a separate pass — without this step a re-versioned
      # doc's votes silently drop from the feed (get_entity_votes filters
      # replaces_id IS NULL) until extraction is re-run by hand. Re-extract the
      # body we just crawled (idempotent: insert-before-delete per document).
      - name: Re-extract votes
        if: ${{ github.event_name == 'schedule' || inputs.ingest }}
        run: |
          if [ -f data/documents/civicplus_manifest.json ]; then
            uv run python scripts/extract_votes.py --apply --entity-path "mo/clayton/$BODY"
          else
            echo "::warning::no documents ingested; skipping vote re-extraction"
          fi

      # Sync the curated roster and rebuild the member-vote graph from the freshly
      # re-extracted votes (idempotent full rebuild across schools + council + stale
      # prune). Runs after any city-body crawl: council re-versions land here, and
      # the rebuild is a cheap no-op when only PC/BoA changed. See connections-graph §4.
      - name: Sync roster + project member votes
        if: ${{ github.event_name == 'schedule' || inputs.ingest }}
        run: |
          if [ -f data/documents/civicplus_manifest.json ]; then
            uv run python scripts/seed_roster.py --apply
            uv run python scripts/project_member_votes.py --apply
          else
            echo "::notice::no documents ingested; skipping member-vote projection"
          fi

      - name: Generate document summaries
        if: ${{ github.event_name == 'schedule' || inputs.ingest }}
        run: uv run python scripts/backfill_doc_summaries.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: civicplus-docs
          path: |
            data/documents/*.pdf
            data/documents/*.txt
            data/documents/civicplus_manifest.json
            data/documents/civicplus_quarantine.json
          if-no-files-found: ignore
          retention-days: 30
