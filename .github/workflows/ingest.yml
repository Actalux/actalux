name: ingest

# Crawl Clayton public-records portals and ingest new/changed documents.
# Schema is gated first: if migrations are pending or have drifted, the
# job hard-fails before any crawl or ingest runs.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL  - project URL, e.g. https://<ref>.supabase.co
#   SUPABASE_KEY  - the key ingest writes with (same key the app uses)
#   SUPABASE_PAT  - Supabase personal access token, for the migration gate
#
# Canva (needs a local browse daemon) and YouTube (discovery-only, and
# YouTube blocks datacenter IPs) are not run here; they stay local/manual.

on:
  workflow_dispatch:
  schedule:
    # Mondays 09:00 UTC (~03:00-04:00 US Central). Board docs change ~monthly,
    # so weekly catches updates without hammering the district's servers.
    - cron: "0 9 * * 1"

permissions:
  contents: read

# One ingest at a time; a manual run during a scheduled run waits rather
# than racing it. We never cancel an in-flight ingest.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Repo secrets stay named SUPABASE_* (unambiguous within this repo);
      # the app/scripts read ACTALUX_-prefixed env vars, so map them here.
      ACTALUX_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ACTALUX_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Ingest writes through the service (secret) key, which bypasses RLS.
      ACTALUX_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ACTALUX_SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
      # The change-digest drafter needs OpenAI for cited summaries; without it the
      # draft still lists documents, just without per-topic cited paragraphs.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # SMTP delivery for the draft email. All optional: unset secrets render as
      # empty strings, and the drafter then writes the file but skips the email.
      ACTALUX_SMTP_HOST: ${{ secrets.ACTALUX_SMTP_HOST }}
      ACTALUX_SMTP_PORT: ${{ secrets.ACTALUX_SMTP_PORT }}
      ACTALUX_SMTP_USER: ${{ secrets.ACTALUX_SMTP_USER }}
      ACTALUX_SMTP_PASSWORD: ${{ secrets.ACTALUX_SMTP_PASSWORD }}
      ACTALUX_DRAFT_EMAIL_FROM: ${{ secrets.ACTALUX_DRAFT_EMAIL_FROM }}
      ACTALUX_DRAFT_EMAIL_TO: ${{ secrets.ACTALUX_DRAFT_EMAIL_TO }}
    steps:
      - uses: actions/checkout@v4

      # Stamp the digest window BEFORE crawling, so every document this run
      # ingests carries created_at >= DIGEST_SINCE and the drafter sees exactly
      # this run's additions (not last week's).
      - name: Record digest window start
        run: echo "DIGEST_SINCE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev

      # bge-small-en-v1.5 is immutable, so a static key restores forever.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1-5

      # Hard gate: pending or drifted migrations stop the pipeline here.
      - name: Verify schema is up to date
        run: uv run python scripts/apply_migrations.py --check

      - name: Crawl Diligent portal
        continue-on-error: true
        run: uv run python scripts/download_documents.py

      - name: Crawl curriculum resources
        continue-on-error: true
        run: uv run python scripts/crawl_curriculum.py

      - name: Crawl finance reports
        continue-on-error: true
        run: uv run python scripts/crawl_clayton_finance.py

      # Ingest each manifest a crawler produced. A missing manifest is a
      # warning (that crawler found nothing or failed above); an ingest
      # crash is a hard failure. Dedup by content_hash makes re-runs safe.
      - name: Ingest manifests
        run: |
          ran=0
          for m in \
            data/documents/diligent_manifest.json \
            data/documents/curriculum_manifest.json \
            data/documents/clayton_finance_manifest.json; do
            if [ -f "$m" ]; then
              echo "::group::ingest $m"
              uv run python scripts/ingest.py --manifest "$m"
              echo "::endgroup::"
              ran=1
            else
              echo "::warning::manifest missing, skipping: $m"
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "::error::no manifests produced; nothing ingested"
            exit 1
          fi

      # Draft a cited "what changed this run" post and (if SMTP is configured)
      # email it for human review. Soft-fails: a drafting/email hiccup must not
      # fail the run or undo the ingest above. Never publishes.
      - name: Draft change digest
        continue-on-error: true
        run: |
          uv run python scripts/draft_substack.py \
            --since "$DIGEST_SINCE" --out draft.md --email

      # Always keep the draft as a downloadable artifact, so a draft is never lost
      # even before email is wired up. Absent file (no changes) is fine.
      - name: Upload draft
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-digest-draft
          path: draft.md
          if-no-files-found: ignore
          retention-days: 30
