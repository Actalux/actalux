name: recalibrate-voiceprints

# Purity + label-gated voiceprint recalibration for a jurisdiction: re-embed each official +
# negative cluster's turns on Modal, pool (Gate B), run nested leave-one-meeting-out with
# negatives, and persist a CANDIDATE gallery + a voiceprint_calibration row. Runs OFF-SESSION
# on a GitHub runner because it is long (yt-dlp download + Modal per-turn embed per meeting) —
# in-session background jobs get reaped at session boundaries. Negatives are never stored.
#
# Manual-trigger only. Prereq: the diarization Modal app must be deployed
# (modal deploy src/actalux/diarization/modal_runner.py — provides embed_cluster_turns_remote).
#
# Required repository secrets:
#   SUPABASE_URL / SUPABASE_KEY / SUPABASE_SERVICE_KEY   (read identities + write gallery)
#   SUPABASE_PAT                                         (apply_migrations --check)
#   MODAL_TOKEN_ID / MODAL_TOKEN_SECRET                  (invoke the embed GPU app)

on:
  workflow_dispatch:
    inputs:
      state:
        description: "Place state slug (e.g. mo)"
        required: true
        default: "mo"
      place:
        description: "Place slug (e.g. clayton)"
        required: true
        default: "clayton"
      body:
        description: "Restrict to one body_slug (blank = all bodies, place-wide)"
        required: false
        default: ""
      precision_bar:
        description: "Macro-precision floor"
        required: false
        default: "0.98"
      min_seconds:
        description: "Minimum pooled speech seconds to keep a sample"
        required: false
        default: "10"
      neg_per_meeting:
        description: "Negatives (non-official clusters) sampled per meeting"
        required: false
        default: "3"
      limit:
        description: "Cap the number of meetings processed (blank = all)"
        required: false
        default: ""

permissions:
  contents: read

# The gallery derives from diarization_turns; never race the transcription/backfill/enroll
# workflows that rewrite them or the gallery.
concurrency:
  group: transcribe
  cancel-in-progress: false

jobs:
  recalibrate-voiceprints:
    runs-on: ubuntu-latest
    # ~2.8 min/meeting (WARP audio download dominates); a full place (~74 meetings) is ~3.5h.
    # All DB writes happen in one pass at the end, so a timeout writes nothing (safe but wasteful).
    timeout-minutes: 330
    env:
      ACTALUX_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ACTALUX_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ACTALUX_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ACTALUX_SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies (incl. the Modal client)
        run: uv sync --no-dev --group diarization

      - name: Install yt-dlp, ffmpeg, Cloudflare WARP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl gpg lsb-release
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp

      - name: Connect Cloudflare WARP (proxy mode)
        run: |
          sudo systemctl enable --now warp-svc
          sleep 6
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 8
          warp-cli --accept-tos status
          curl -s --socks5-hostname 127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace \
            | grep -q "warp=on" || { echo "WARP not active"; exit 1; }

      - name: Verify schema is up to date
        run: uv run python scripts/apply_migrations.py --check

      - name: Recalibrate (embed turns on Modal + nested LOMO + persist candidate)
        env:
          STATE: ${{ inputs.state }}
          PLACE: ${{ inputs.place }}
          BODY: ${{ inputs.body }}
          PRECISION_BAR: ${{ inputs.precision_bar }}
          MIN_SECONDS: ${{ inputs.min_seconds }}
          NEG_PER_MEETING: ${{ inputs.neg_per_meeting }}
          LIMIT: ${{ inputs.limit }}
        run: |
          ARGS="--state $STATE --place $PLACE --apply --proxy socks5h://127.0.0.1:40000"
          [ -n "$BODY" ] && ARGS="$ARGS --body $BODY"
          [ -n "$PRECISION_BAR" ] && ARGS="$ARGS --precision-bar $PRECISION_BAR"
          [ -n "$MIN_SECONDS" ] && ARGS="$ARGS --min-seconds $MIN_SECONDS"
          [ -n "$NEG_PER_MEETING" ] && ARGS="$ARGS --neg-per-meeting $NEG_PER_MEETING"
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          uv run --group diarization python scripts/recalibrate_voiceprints.py $ARGS
