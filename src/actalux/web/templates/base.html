<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Actalux{% endblock %} — Clayton School District Records</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --text: #1a1a2e;
            --bg: #fafafa;
            --surface: #fff;
            --border: #e0e0e0;
            --accent: #2c5282;
            --accent-light: #ebf4ff;
            --muted: #6b7280;
            --success: #059669;
            --max-width: 48rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            background: var(--surface);
        }
        header nav {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        header .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        header a:hover { color: var(--accent); }
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
        .search-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .search-form input[type="text"] {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }
        .search-form button {
            padding: 0.6rem 1.2rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .search-form button:hover { opacity: 0.9; }
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        .result-card .meta {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .result-card .content {
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .result-card .hash-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--accent);
        }
        .result-card .source-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
        }
        .result-card .source-link:hover { text-decoration: underline; }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
        }
        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
        }
        footer a { color: var(--accent); text-decoration: none; }
        .htmx-indicator {
            display: none;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .htmx-request .htmx-indicator { display: inline; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--accent-light);
            color: var(--accent);
        }
        .error-form { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .error-form textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            min-height: 4rem;
        }
        .error-form input[type="email"] {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
            width: 100%;
            max-width: 20rem;
            margin-top: 0.5rem;
        }
        .error-form button {
            margin-top: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .section-group { margin-bottom: 2rem; }
        .section-group h3 {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            text-transform: capitalize;
        }
        .highlight { background: #fef3c7; padding: 0.1rem 0.2rem; border-radius: 2px; }
        .context-chunk { opacity: 0.6; }
        .context-chunk.current { opacity: 1; background: var(--accent-light); border-radius: 4px; padding: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Actalux</a>
            <a href="/topic/budget">Budget</a>
            <a href="/methodology">Methodology</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Actalux is a 501(c)(3) nonprofit. Every quote links to a verified source.</p>
        <p><a href="/methodology">How this works</a> &middot; <a href="https://github.com/Actalux/actalux">Source code</a></p>
    </footer>
</body>
</html>
