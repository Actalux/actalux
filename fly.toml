# Fly.io config for the Actalux web app.
#
# `app` is a placeholder — `fly launch` will set the real name on first deploy.
# Secrets (ACTALUX_SUPABASE_URL/KEY, ANTHROPIC_API_KEY) are set via
# `fly secrets`, never committed here. See DEPLOY.md.

app = "actalux"
primary_region = "ord"  # Chicago — closest Fly region to St. Louis

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: a public archive shouldn't cold-start, and keeping one machine
  # warm avoids compounding latency with Supabase's free-tier resume.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"  # DB-free liveness probe (see web/app.py)

[[vm]]
  size = "shared-cpu-1x"
  # 1 GB to start. If torch + bge run tight under load, bump to "2gb"
  # (`fly scale memory 2048`) — see DEPLOY.md.
  memory = "1gb"
